<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY BIRTHDAY For Kaito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&family=Pacifico&display=swap');

        body {
            background: radial-gradient(circle, #fff5f5 0%, #fed7e2 100%);
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation;
            min-height: 100vh;
        }

        .title-text {
            font-family: 'Pacifico', cursive;
            text-shadow: 2px 2px 0px rgba(255, 105, 180, 0.2);
        }

        /* ケーキのスタイル */
        .cake-container {
            position: relative;
            transition: transform 0.3s ease;
            margin: 2rem auto;
        }

        .candle {
            width: 12px;
            height: 35px;
            background: linear-gradient(to bottom, #ffd1dc, #ff8da1);
            border-radius: 4px;
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .flame {
            width: 12px;
            height: 18px;
            background: #ffcc00;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -15px;
            left: 0;
            animation: flicker 0.6s infinite alternate;
            box-shadow: 0 0 15px #ffcc00;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(2deg); opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 100;
        }

        .float {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .message-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 3px solid #fbb6ce;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(251, 182, 206, 0.4);
        }

        /* 文字が重ならないための余白調整 */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            gap: 1.5rem;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="max-w-md w-full content-wrapper z-10">
        <!-- ヘッダー -->
        <div class="float text-center">
            <h1 class="title-text text-5xl text-pink-500 mb-1">Happy Birthday</h1>
            <h2 class="text-4xl text-blue-400 font-bold tracking-tight">Kaito!!</h2>
        </div>

        <!-- バースデーケーキ -->
        <div class="cake-container w-40 h-40 cursor-pointer" id="cake">
            <div class="candle">
                <div class="flame"></div>
            </div>
            <svg viewBox="0 0 200 200" class="w-full h-full drop-shadow-lg">
                <rect x="40" y="100" width="120" height="60" rx="10" fill="#fbcfe8" />
                <path d="M40 100 Q 55 110, 70 100 T 100 100 T 130 100 T 160 100" fill="none" stroke="#f687b3" stroke-width="8" />
                <rect x="50" y="70" width="100" height="40" rx="10" fill="#fff" />
                <circle cx="65" cy="75" r="8" fill="#fbb6ce" />
                <circle cx="100" cy="75" r="8" fill="#fbb6ce" />
                <circle cx="135" cy="75" r="8" fill="#fbb6ce" />
                <rect x="30" y="150" width="140" height="15" rx="5" fill="#f687b3" />
            </svg>
            <p class="text-pink-400 font-bold mt-4 animate-pulse text-sm text-center">Tap to Celebrate!</p>
        </div>

        <!-- メッセージエリア -->
        <div class="message-card p-6 w-full transform -rotate-1">
            <p class="text-gray-800 text-base md:text-lg leading-relaxed text-center whitespace-pre-wrap font-medium">誕生日おめでとう！！
いつも接してくれてありがとう。
誕生日にインフル重なって大変だと思うけど、お大事にね。
これからもよろしくね🌟</p>
        </div>

        <!-- クラッカーボタン -->
        <button id="crackerBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-10 rounded-full shadow-xl transform active:scale-95 transition-all flex items-center justify-center gap-3">
            <span class="text-2xl">🎉</span> クラッカー！ <span class="text-2xl">🎉</span>
        </button>
    </div>

    <!-- 背景装飾 -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[10%] left-[10%] text-4xl float" style="animation-delay: 0s;">🎈</div>
        <div class="absolute top-[15%] right-[15%] text-4xl float" style="animation-delay: 0.5s;">🎁</div>
        <div class="absolute bottom-[20%] left-[15%] text-4xl float" style="animation-delay: 1s;">🍀</div>
        <div class="absolute bottom-[10%] right-[10%] text-4xl float" style="animation-delay: 1.5s;">✨</div>
    </div>

    <script>
        const cake = document.getElementById('cake');
        const crackerBtn = document.getElementById('crackerBtn');

        function createConfetti(x, y, amount = 40) {
            const colors = ['#f687b3', '#fbb6ce', '#63b3ed', '#faf089', '#9f7aea', '#4fd1c5', '#ffffff'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 4 + Math.random() * 12;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                let posX = x;
                let posY = y;
                let opacity = 1;
                let rotation = Math.random() * 360;

                document.body.appendChild(confetti);

                const animate = () => {
                    posX += vx;
                    posY += vy + 0.4; // 重力
                    opacity -= 0.008;
                    rotation += 5;
                    
                    confetti.style.left = posX + 'px';
                    confetti.style.top = posY + 'px';
                    confetti.style.opacity = opacity;
                    confetti.style.transform = `rotate(${rotation}deg)`;

                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        confetti.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }

        // 自動クラッカー演出（開いた時に数回鳴らす）
        function autoCelebrate() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // 1回目の爆発
            setTimeout(() => createConfetti(width * 0.2, height * 0.4), 600);
            // 2回目の爆発
            setTimeout(() => createConfetti(width * 0.8, height * 0.4), 1100);
            // 3回目の爆発（中心）
            setTimeout(() => createConfetti(width * 0.5, height * 0.3, 60), 1600);
        }

        // イベントリスナー
        cake.addEventListener('click', (e) => {
            createConfetti(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
        });

        crackerBtn.addEventListener('click', () => {
            const rect = crackerBtn.getBoundingClientRect();
            createConfetti(rect.left + rect.width / 2, rect.top, 60);
        });

        window.onload = autoCelebrate;
    </script>
</body>
</html>
